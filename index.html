<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🍑 PIMP CLICKER: VEGAS NIGHTS — Роскошная версия</title>
    <style>
        /* ========== ROOT ПЕРЕМЕННЫЕ (премиум-стиль) ========== */
        :root {
            --bg: #0a0010;
            --neon-pink: #ff2d95;
            --neon-pink-glow: #ff2d9580;
            --neon-blue: #00d4ff;
            --neon-blue-glow: #00d4ff60;
            --gold: #ffd700;
            --gold-glow: #ffd70050;
            --green: #00ff88;
            --green-glow: #00ff8860;
            --dark-panel: #120020;
            --dark-panel2: #1a0030;
            --text: #e0d0f0;
            --text-bright: #ffffff;
            --card-bg: #1a0a2e;
            --danger: #ff3355;
            --orange: #ff8c00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 20%, #1a003050 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, #2d005020 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, #0a0020 0%, #000008 100%);
            font-family: 'Segoe UI', 'Arial', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            cursor: default;
            touch-action: manipulation;
        }

        /* Частицы */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.2;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        /* ЛОГИН */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: #0a0012;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.6s, visibility 0.6s;
        }

        .login-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .login-logo {
            font-size: 3.5em;
            font-weight: 900;
            background: linear-gradient(180deg, #ffd700 0%, #ff8c00 50%, #ffd700 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px #ffd70060);
            animation: titleGlow 2s ease-in-out infinite;
            margin-bottom: 6px;
        }

        @keyframes titleGlow {
            0%,100% { filter: drop-shadow(0 0 20px #ffd70060); }
            50% { filter: drop-shadow(0 0 40px #ffd700aa); }
        }

        .login-sub {
            color: var(--neon-pink);
            letter-spacing: 4px;
            font-size: 0.85em;
            margin-bottom: 25px;
            animation: subtitlePulse 1.5s ease-in-out infinite;
        }

        @keyframes subtitlePulse {
            0%,100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .login-input {
            background: #1a0030;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 1.1em;
            text-align: center;
            font-weight: 700;
            width: 240px;
            margin-bottom: 15px;
            outline: none;
        }

        .login-btn {
            padding: 14px 40px;
            border-radius: 30px;
            border: none;
            background: var(--neon-pink);
            color: #fff;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1em;
            box-shadow: 0 0 30px var(--neon-pink-glow);
            transition: all 0.25s;
        }

        .login-btn:active {
            transform: scale(0.93);
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .game-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 530px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .header {
            text-align: center;
            padding: 10px 0;
        }

        .header .title {
            font-size: 2.2em;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(180deg, #ffd700 0%, #ff8c00 50%, #ffd700 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px #ffd70060);
            animation: titleGlow 2s ease-in-out infinite;
        }

        .player-name {
            font-size: 0.8em;
            color: var(--neon-pink);
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: subtitlePulse 1.5s ease-in-out infinite;
        }

        /* ДИСПЛЕЙ ДЕНЕГ */
        .money-display {
            background: var(--dark-panel);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 16px 20px;
            text-align: center;
            box-shadow: 0 0 30px var(--gold-glow), inset 0 0 20px #00000050;
            position: relative;
            overflow: hidden;
        }

        .money-display::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, #ffd70020, transparent, #ffd70020, transparent);
            animation: rotateGlow 4s linear infinite;
            z-index: 0;
            opacity: 0.5;
        }

        @keyframes rotateGlow {
            to { transform: rotate(360deg); }
        }

        .money-label {
            position: relative;
            z-index: 1;
            font-size: 0.8em;
            color: #ffd700aa;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .money-amount {
            position: relative;
            z-index: 1;
            font-size: 2.8em;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 30px var(--gold-glow);
            transition: transform 0.1s;
        }

        .money-amount.pop {
            animation: moneyPop 0.3s ease-out;
        }

        @keyframes moneyPop {
            0% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .per-second {
            position: relative;
            z-index: 1;
            font-size: 0.8em;
            color: var(--green);
            text-shadow: 0 0 10px var(--green-glow);
        }

        .rank-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 6px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .rank-badge-main {
            background: linear-gradient(135deg, #2a0050, #4a0070);
            border: 1px solid #a060ff;
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.75em;
            color: #c090ff;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #a060ff80;
        }

        .rank-progress {
            font-size: 0.7em;
            color: #aa88cc;
        }

        /* РАЙОНЫ (ГОРОДА) */
        .city-bar {
            display: flex;
            gap: 4px;
            background: var(--dark-panel);
            border-radius: 14px;
            padding: 4px;
            border: 1px solid #2a1040;
            flex-wrap: wrap;
            justify-content: center;
        }

        .city-btn {
            padding: 8px 12px;
            border: none;
            background: transparent;
            color: #8877aa;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.75em;
            transition: all 0.3s;
            white-space: nowrap;
            font-family: inherit;
        }

        .city-btn.active {
            background: var(--dark-panel2);
            color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue-glow);
            text-shadow: 0 0 8px var(--neon-blue);
        }

        .city-btn.locked {
            color: #3a2a4a;
            opacity: 0.5;
            pointer-events: none;
        }

        /* ТАБЫ ОСНОВНЫЕ */
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--dark-panel);
            border-radius: 14px;
            padding: 4px;
            border: 1px solid #2a1040;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 6px;
            border: none;
            background: transparent;
            color: #9988aa;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.78em;
            letter-spacing: 1px;
            transition: all 0.3s;
            white-space: nowrap;
            font-family: inherit;
        }

        .tab-btn.active {
            background: var(--dark-panel2);
            color: var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-pink-glow);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .tab-panel {
            display: none;
            animation: fadeSlideIn 0.4s ease-out;
        }

        .tab-panel.active {
            display: block;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* КЛИК-ЗОНА */
        .click-area {
            display: flex;
            justify-content: center;
            padding: 20px 0;
        }

        .main-click-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid var(--neon-pink);
            background: radial-gradient(circle at 40% 35%, #3a1040, #150020);
            cursor: pointer;
            font-size: 3.5em;
            transition: transform 0.1s ease-out, box-shadow 0.15s;
            box-shadow: 0 0 40px var(--neon-pink-glow), 0 0 80px #ff2d9530, inset 0 0 30px #00000080;
            animation: btnBreathe 2s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .main-click-btn:active {
            transform: scale(0.88) !important;
            box-shadow: 0 0 80px var(--neon-pink), 0 0 120px #ff2d9580 !important;
            animation: none !important;
        }

        @keyframes btnBreathe {
            0%,100% { box-shadow: 0 0 40px var(--neon-pink-glow), 0 0 80px #ff2d9530; }
            50% { box-shadow: 0 0 55px var(--neon-pink-glow), 0 0 100px #ff2d9550; }
        }

        .click-hint {
            text-align: center;
            color: #ff6db3;
            font-size: 0.75em;
            letter-spacing: 2px;
            margin-top: 6px;
            animation: hintFade 2s ease-in-out infinite;
        }

        @keyframes hintFade {
            0%,100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .click-value-pop {
            position: fixed;
            pointer-events: none;
            font-weight: 900;
            font-size: 1.5em;
            color: var(--gold);
            text-shadow: 0 0 15px var(--gold);
            animation: popUp 1s ease-out forwards;
            z-index: 100;
        }

        @keyframes popUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-120px) scale(1.5); }
        }

        /* КАРТОЧКИ ДЕВУШЕК И БУСТОВ */
        .shop-section-title {
            color: var(--neon-blue);
            letter-spacing: 2px;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 8px;
            text-shadow: 0 0 10px var(--neon-blue-glow);
            border-bottom: 1px solid #2a1040;
            padding-bottom: 6px;
        }

        .upgrade-card {
            background: var(--card-bg);
            border: 1px solid #2a1040;
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .upgrade-card:active {
            transform: scale(0.97);
        }

        .upgrade-card:hover {
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink-glow);
            background: #1f0a38;
        }

        .upgrade-card.owned {
            border-color: var(--green);
            box-shadow: 0 0 15px var(--green-glow);
            background: #0a1a10;
        }

        .upgrade-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(30%);
        }

        .upgrade-icon {
            font-size: 2.5em;
            min-width: 50px;
            text-align: center;
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .upgrade-info {
            flex: 1;
            min-width: 0;
        }

        .upgrade-name {
            font-weight: 700;
            color: #fff;
            font-size: 0.95em;
        }

        .upgrade-desc {
            font-size: 0.7em;
            color: #9988aa;
        }

        .upgrade-stats {
            font-size: 0.7em;
            color: var(--green);
            text-shadow: 0 0 6px var(--green-glow);
        }

        .upgrade-cost {
            font-weight: 700;
            color: var(--gold);
            font-size: 0.9em;
            white-space: nowrap;
        }

        .upgrade-count {
            position: absolute;
            top: 8px;
            right: 12px;
            background: var(--neon-pink);
            color: #fff;
            font-size: 0.7em;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 12px;
            box-shadow: 0 0 10px var(--neon-pink-glow);
            min-width: 24px;
            text-align: center;
        }

        /* ПОДТАБЫ КАЗИНО */
        .sub-tabs {
            display: flex;
            gap: 3px;
            background: #1a0a2e;
            border-radius: 10px;
            padding: 3px;
            margin-bottom: 10px;
            border: 1px solid #2a1040;
            flex-wrap: wrap;
        }

        .sub-tab-btn {
            flex: 1;
            min-width: 55px;
            padding: 8px 4px;
            border: none;
            background: transparent;
            color: #8877aa;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.7em;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            font-family: inherit;
            white-space: nowrap;
        }

        .sub-tab-btn.active {
            background: #2a1050;
            color: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue-glow);
            text-shadow: 0 0 8px var(--neon-blue);
        }

        .sub-panel {
            display: none;
            animation: fadeSlideIn 0.35s ease-out;
        }

        .sub-panel.active {
            display: block;
        }

        /* БЛЭКДЖЕК СТИЛИ */
        .bj-table {
            background: var(--dark-panel);
            border-radius: 20px;
            padding: 20px 16px;
            border: 2px solid #2a1040;
            text-align: center;
            box-shadow: inset 0 0 40px #00000050;
        }

        .bj-title {
            color: var(--neon-blue);
            font-size: 1.2em;
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--neon-blue-glow);
            margin-bottom: 10px;
        }

        .bj-cards {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            min-height: 60px;
            margin: 8px 0;
        }

        .bj-card {
            background: #fff;
            color: #000;
            font-weight: 900;
            font-size: 1.1em;
            padding: 8px 14px;
            border-radius: 10px;
            box-shadow: 0 4px 15px #00000060;
            animation: dealCard 0.4s ease-out;
            min-width: 45px;
            text-align: center;
            border: 2px solid #ddd;
        }

        .bj-card.red {
            color: #d00;
        }

        @keyframes dealCard {
            from { transform: translateY(-60px) rotate(-15deg); opacity: 0; }
            to { transform: translateY(0) rotate(0); opacity: 1; }
        }

        .bj-score {
            font-size: 1.3em;
            font-weight: 900;
            color: #fff;
            margin: 6px 0;
        }

        .bj-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .bj-btn {
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-family: inherit;
            letter-spacing: 1px;
            transition: all 0.2s;
            font-size: 0.85em;
            color: #fff;
            touch-action: manipulation;
        }

        .bj-btn:active { transform: scale(0.93); }
        .bj-btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        .bj-btn.hit { background: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue-glow); }
        .bj-btn.stand { background: var(--danger); box-shadow: 0 0 20px #ff335580; }
        .bj-btn.new { background: var(--green); color: #000; box-shadow: 0 0 20px var(--green-glow); }
        .bj-btn.double { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold-glow); }

        .game-bet-input {
            background: #1a0030;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 1em;
            width: 120px;
            text-align: center;
            font-weight: 700;
            font-family: inherit;
            outline: none;
        }

        .game-result {
            font-size: 1em;
            font-weight: 700;
            margin-top: 10px;
            padding: 8px;
            border-radius: 10px;
            text-align: center;
        }

        .game-result.win { color: var(--green); text-shadow: 0 0 15px var(--green); }
        .game-result.lose { color: var(--danger); text-shadow: 0 0 15px var(--danger); }
        .game-result.push { color: var(--gold); }

        /* COIN FLIP */
        .coin-display-large {
            font-size: 4.5em;
            text-align: center;
            margin: 10px 0;
            transition: transform 0.1s;
            background: radial-gradient(circle at 40% 35%, #ffe066, #b8860b);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            margin-right: auto;
            border: 4px solid #8b6914;
            box-shadow: 0 8px 25px #00000060, inset 0 2px 10px #fff8d0;
        }

        .coin-display-large.flipping {
            animation: coinFlipAnim 0.8s ease-out;
        }

        @keyframes coinFlipAnim {
            0% { transform: rotateY(0) scale(1); }
            50% { transform: rotateY(720deg) scale(1.2); }
            100% { transform: rotateY(1440deg) scale(1); }
        }

        .coin-choice-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 10px 0;
        }

        .coin-choice-btn {
            padding: 12px 25px;
            border-radius: 25px;
            border: 2px solid var(--gold);
            background: var(--dark-panel2);
            color: var(--gold);
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9em;
            font-family: inherit;
            transition: all 0.2s;
        }

        .coin-choice-btn:active { transform: scale(0.93); }
        .coin-choice-btn:disabled { opacity: 0.4; pointer-events: none; }

        /* РУЛЕТКА CANVAS */
        .roulette-container {
            background: var(--dark-panel);
            border-radius: 20px;
            padding: 18px 14px;
            border: 2px solid #2a1040;
        }

        .roulette-canvas-wrap {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto 20px;
        }

        canvas#rouletteCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.3);
            background: #1a2a1a;
        }

        .roulette-pointer {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            color: white;
            text-shadow: 0 0 8px #000;
            z-index: 5;
            pointer-events: none;
        }

        .bet-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-bottom: 12px;
            background: #0f001f;
            padding: 10px;
            border-radius: 16px;
        }

        .bet-item {
            flex: 1;
            min-width: 140px;
        }

        .bet-item label {
            display: block;
            font-size: 0.7em;
            color: #ccaa88;
        }

        .bet-type {
            background: #1a0030;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 6px 8px;
            border-radius: 20px;
            font-size: 0.8em;
            width: 100%;
            margin-top: 4px;
            cursor: pointer;
            font-family: inherit;
        }

        .bet-amount {
            background: #1a0030;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 6px 8px;
            border-radius: 20px;
            width: 100%;
            margin-top: 4px;
            font-family: inherit;
            text-align: center;
        }

        .spin-roulette-btn {
            background: var(--neon-pink);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            box-shadow: 0 0 20px var(--neon-pink-glow);
        }

        .spin-roulette-btn:active { transform: scale(0.96); }
        .spin-roulette-btn:disabled { opacity: 0.5; pointer-events: none; }

        /* СЛОТЫ 3x3 */
        .slot-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-width: 240px;

(function(){const CITIES=[{id:'alley',name:'Back Alley',icon:'🏚️',unlockMoney:0,unlockRank:0,girls:[{id:'street',name:'Уличная',icon:'💃',baseCost:15,baseIncome:0.5,costGrowth:1.18,desc:'Работает на бульваре'},{id:'bar',name:'Барная',icon:'🍸',baseCost:100,baseIncome:3,costGrowth:1.2,desc:'Ошивается в баре'}]},{id:'downtown',name:'Downtown',icon:'🍸',unlockMoney:5000,unlockRank:1,girls:[{id:'lounge',name:'Лаунж',icon:'🥂',baseCost:600,baseIncome:14,costGrowth:1.22,desc:'Поёт в лаунже'},{id:'dancer',name:'Танцовщица',icon:'💃',baseCost:3000,baseIncome:60,costGrowth:1.25,desc:'Зажигает на сцене'}]},{id:'heights',name:'Luxury Heights',icon:'💎',unlockMoney:50000,unlockRank:2,girls:[{id:'elite',name:'Элитная',icon:'💎',baseCost:8000,baseIncome:180,costGrowth:1.28,desc:'VIP-эскорт'},{id:'model',name:'Модель',icon:'👠',baseCost:35000,baseIncome:700,costGrowth:1.3,desc:'С обложки журнала'}]},{id:'strip',name:'The Strip',icon:'🌟',unlockMoney:500000,unlockRank:3,girls:[{id:'vegas',name:'Vegas VIP',icon:'🌟',baseCost:150000,baseIncome:2500,costGrowth:1.32,desc:'Звезда Стрипа'},{id:'celebrity',name:'Знаменитость',icon:'🎬',baseCost:800000,baseIncome:12000,costGrowth:1.35,desc:'Голливудская звезда'}]},{id:'paradise',name:'Neon Paradise',icon:'👑',unlockMoney:5000000,unlockRank:4,girls:[{id:'golden',name:'Золотая',icon:'👑',baseCost:4000000,baseIncome:50000,costGrowth:1.38,desc:'Королева Вегаса'},{id:'goddess',name:'Богиня',icon:'🔮',baseCost:25000000,baseIncome:350000,costGrowth:1.42,desc:'Небесное создание'}]}];const RANKS=[{name:'🆕 НОВИЧОК',minMoney:0},{name:'🥉 БЫВАЛЫЙ',minMoney:1000},{name:'🥈 СУТЕНЕР',minMoney:10000},{name:'🌟 БОСС',minMoney:100000},{name:'💎 МАГНАТ',minMoney:1000000},{name:'👑 КОРОЛЬ ВЕГАСА',minMoney:10000000}];const state={playerName:'Sugardaddy',money:0,totalClicks:0,clickPower:1,globalMultiplier:1,critChance:0,autoBoost:0,casinoBoost:0,cashbackChance:0,tempMultiplier:1,tempMultiplierEnd:0,currentCity:0,unlockedCities:[0],autoClickers:[],boosts:[],dirtyFlags:{shop:true,boosts:true,cityBar:true}};CITIES.forEach((city,ci)=>{city.girls.forEach(g=>{state.autoClickers.push({...g,cityIndex:ci,count:0});});});state.boosts=[{id:'click2x',name:'Клик ×2',icon:'👊',baseCost:500,count:0,costGrowth:3,desc:'Удваивает силу клика',apply:()=>{state.clickPower*=2;}},{id:'global2x',name:'Глобал ×2',icon:'🌍',baseCost:5000,count:0,costGrowth:4,desc:'Удваивает ВЕСЬ доход',apply:()=>{state.globalMultiplier*=2;}},{id:'critChance',name:'Крит-шанс',icon:'🎯',baseCost:2000,count:0,costGrowth:2.5,desc:'+8% шанс крит. клика (×5)',apply:()=>{state.critChance+=0.08;}},{id:'autoBoost',name:'Авто-буст',icon:'⚡',baseCost:15000,count:0,costGrowth:5,desc:'+50% эффективности автокликеров',apply:()=>{state.autoBoost+=0.5;}},{id:'cashback',name:'Кэшбэк',icon:'💸',baseCost:8000,count:0,costGrowth:3,desc:'+12% шанс вернуть 50% стоимости',apply:()=>{state.cashbackChance+=0.12;}},{id:'casinoMaster',name:'Мастер казино',icon:'🎩',baseCost:12000,count:0,costGrowth:3.5,desc:'+8% ко всем выигрышам',apply:()=>{state.casinoBoost+=0.08;}}];function formatMoney(n){if(n>=1e12)return'$'+(n/1e12).toFixed(2)+'T';if(n>=1e9)return'$'+(n/1e9).toFixed(2)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(1)+'K';return'$'+Math.floor(n).toLocaleString('ru-RU');}function getRank(){for(let i=RANKS.length-1;i>=0;i--)if(state.money>=RANKS[i].minMoney)return RANKS[i];return RANKS[0];}function getNextRank(){let idx=RANKS.indexOf(getRank());return idx<RANKS.length-1?RANKS[idx+1]:null;}function getTotalIncomePerSec(){let total=0;state.autoClickers.forEach(a=>{total+=a.baseIncome*a.count;});total*=state.globalMultiplier*(1+state.autoBoost)*(Date.now()<state.tempMultiplierEnd?state.tempMultiplier:1);return total;}function getClickValue(){let val=state.clickPower*state.globalMultiplier;if(Date.now()<state.tempMultiplierEnd)val*=state.tempMultiplier;if(state.critChance>0&&Math.random()<state.critChance){val*=5;spawnPopText('💥 КРИТ!','#ff2d95');}return val;}function spawnPopTe d);});let coinBtnsDiv=document.getElementById('coinBtns');if(coinBtnsDiv){coinBtnsDiv.addEventListener('click',(e)=>{let btn=e.target.closest('.coin-choice-btn');if(btn&&!btn.disabled)flipCoin(btn.dataset.choice);});}let mainTabs=document.getElementById('mainTabs');if(mainTabs){mainTabs.addEventListener('click',(e)=>{let btn=e.target.closest('.tab-btn');if(!btn)return;document.querySelectorAll('#mainTabs .tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));btn.classList.add('active');let panel=document.getElementById('panel-'+btn.dataset.tab);if(panel)panel.classList.add('active');});}let casinoSubTabs=document.getElementById('casinoSubTabs');if(casinoSubTabs){casinoSubTabs.addEventListener('click',(e)=>{let btn=e.target.closest('.sub-tab-btn');if(!btn)return;document.querySelectorAll('#casinoSubTabs .sub-tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('#panel-casino .sub-panel').forEach(p=>p.classList.remove('active'));btn.classList.add('active');let sub=document.getElementById('sub-'+btn.dataset.sub);if(sub)sub.classList.add('active');});}let cityBarDiv=document.getElementById('cityBar');if(cityBarDiv){cityBarDiv.addEventListener('click',(e)=>{let btn=e.target.closest('.city-btn');if(!btn||btn.classList.contains('locked'))return;let idx=parseInt(btn.dataset.city);if(state.unlockedCities.includes(idx)){state.currentCity=idx;renderCityBar();state.dirtyFlags.shop=true;renderShop();updateMoneyUI();}});}let newGame=document.getElementById('btnNewGame');if(newGame)newGame.addEventListener('click',startBJ);let hitBtn=document.getElementById('btnHit');if(hitBtn)hitBtn.addEventListener('click',hitBJ);let standBtn=document.getElementById('btnStand');if(standBtn)standBtn.addEventListener('click',standBJ);let spinRouletteBtn=document.getElementById('spinRouletteBtn');if(spinRouletteBtn)spinRouletteBtn.addEventListener('click',spinRoulette);let spinSlotsBtn=document.getElementById('spinBtn');if(spinSlotsBtn)spinSlotsBtn.addEventListener('click',spinSlots);createParticles();let lastTick=Date.now();setInterval(()=>{let now=Date.now();let dt=(now-lastTick)/1000;lastTick=now;let inc=getTotalIncomePerSec()*dt;if(inc>0)state.money+=inc;if(Date.now()>=state.tempMultiplierEnd&&state.tempMultiplier!==1)state.tempMultiplier=1;updateMoneyUI();if(Math.random()<0.05){state.dirtyFlags.shop=true;state.dirtyFlags.boosts=true;renderShop();renderBoosts();}checkCityUnlocks();},200);setInterval(()=>{let overlay=document.getElementById('loginOverlay');if(overlay&&overlay.classList.contains('hidden'))saveGame();},30000);});})();
